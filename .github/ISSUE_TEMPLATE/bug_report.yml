name: Bug Report
description: Report a bug in slip-stream
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Minimal code or steps to reproduce the issue.
      render: python
    validations:
      required: true
  - type: input
    id: slip-stream-version
    attributes:
      label: slip-stream Version
      description: "Output of: pip show slip-stream"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Output of: python --version"
      placeholder: "3.12.0"
    validations:
      required: true
