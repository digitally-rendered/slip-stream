version: 2
updates:
  # Python dependencies (Poetry)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      production:
        patterns:
          - "fastapi"
          - "motor"
          - "pydantic"
          - "pymongo"
          - "dotted-dict"
        update-types:
          - "minor"
          - "patch"
      optional-extras:
        patterns:
          - "pyyaml"
          - "xmltodict"
          - "httpx"
          - "strawberry-graphql"
          - "mcp"
          - "sqlalchemy"
          - "schemathesis"
          - "opentelemetry-*"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "black"
          - "mypy"
          - "types-*"
          - "pdoc"
          - "pre-commit"
          - "aiosqlite"
          - "greenlet"
          - "mongomock-motor"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        patterns:
          - "*"
