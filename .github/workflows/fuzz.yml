name: Fuzz Testing

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Fuzz mode"
        required: false
        default: "all"
        type: choice
        options:
          - lifecycle
          - positive
          - negative
          - all
      max_examples:
        description: "Max examples for schemathesis"
        required: false
        default: "20"
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  fuzz:
    name: Schemathesis Fuzz Tests
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      FUZZ_MODE: ${{ github.event.inputs.mode || 'all' }}
      MAX_EXAMPLES: ${{ github.event.inputs.max_examples || '20' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --extras test

      - name: Install fuzz requirements
        run: pip install -r benchmarks/fuzz/requirements.txt

      - name: Start benchmark app
        run: |
          BENCH_MONGO_URI=mongodb://localhost:27017 \
          BENCH_DB_NAME=slip_stream_fuzz_ci \
          BENCH_GRAPHQL=1 \
          BENCH_GRAPHQL_VERSIONED=1 \
          poetry run uvicorn benchmarks.app:app --port 8100 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8100/docs > /dev/null 2>&1; then
              echo "App healthy after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run fuzz tests
        env:
          FUZZ_MODE_ARG: ${{ env.FUZZ_MODE }}
          MAX_EXAMPLES_ARG: ${{ env.MAX_EXAMPLES }}
        run: |
          python benchmarks/fuzz/run_fuzz.py \
            --url http://localhost:8100/api/v1 \
            --mode "${FUZZ_MODE_ARG}" \
            --max-examples "${MAX_EXAMPLES_ARG}" \
            --output benchmarks/results/fuzz-ci.json
        continue-on-error: true

      - name: Run GraphQL fuzz tests
        run: |
          python benchmarks/fuzz/run_graphql_fuzz.py \
            --url http://localhost:8100/graphql \
            --mode all \
            --output benchmarks/results/graphql-fuzz-ci.json
        continue-on-error: true

      - name: Run MCP fuzz tests
        run: |
          python benchmarks/fuzz/run_mcp_fuzz.py \
            --cmd "poetry run python -m slip_stream.mcp.server --schema-dir benchmarks/schemas" \
            --mode all \
            --output benchmarks/results/mcp-fuzz-ci.json
        continue-on-error: true

      - name: Run stream event validation
        run: |
          poetry run python benchmarks/fuzz/run_stream_fuzz.py \
            --schema-dir benchmarks/schemas \
            --mode all \
            --output benchmarks/results/stream-fuzz-ci.json
        continue-on-error: true

      - name: Run stream micro-benchmarks
        run: |
          poetry run pytest benchmarks/stream/ --benchmark-only -v \
            --benchmark-json=benchmarks/results/stream-bench-ci.json || true

      - name: Upload fuzz results
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-results-${{ github.sha }}
          path: benchmarks/results/
          retention-days: 90

      - name: Comment fuzz results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let results = {};
            try {
              results = JSON.parse(fs.readFileSync('benchmarks/results/fuzz-ci.json', 'utf8'));
            } catch (e) {
              console.log('No fuzz results file found');
              return;
            }

            const body = [
              '## Fuzz Test Results (slip-stream)',
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Mode | \`${results.mode || 'all'}\` |`,
              `| Total Checks | ${results.total || 0} |`,
              `| Passed | ${results.passed || 0} |`,
              `| Failed | ${results.failed || 0} |`,
              '',
              results.failed > 0 ? '**Failed checks:**' : '',
              ...(results.results || [])
                .filter(r => !r.passed)
                .map(r => `- \`${r.mode}/${r.entity}/${r.step}\`: ${r.detail}`),
              '',
              `<sub>Generated by fuzz workflow on ${new Date().toISOString()}</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.body.includes('## Fuzz Test Results (slip-stream)')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
