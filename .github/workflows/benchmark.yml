name: Benchmark

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      scenario:
        description: "k6 scenario to run"
        required: false
        default: "load"
        type: choice
        options:
          - smoke
          - load
          - stress
          - breaking

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Performance Baseline
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      K6_SCENARIO: ${{ github.event.inputs.scenario || 'load' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --extras yaml

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Start benchmark app
        run: |
          BENCH_MONGO_URI=mongodb://localhost:27017 \
          BENCH_DB_NAME=slip_stream_bench_ci \
          BENCH_GRAPHQL=1 \
          BENCH_GRAPHQL_VERSIONED=1 \
          poetry run uvicorn benchmarks.app:app --host 0.0.0.0 --port 8100 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8100/health > /dev/null 2>&1; then
              echo "App healthy after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run k6 benchmark
        run: |
          k6 run benchmarks/k6/perf_baseline.js \
            --env BASE_URL=http://localhost:8100/api/v1 \
            --env "SCENARIO=${K6_SCENARIO}" \
            --summary-export=benchmarks/results/ci-summary.json \
            --out json=benchmarks/results/ci-raw.json
        continue-on-error: true

      - name: Run GraphQL k6 benchmark
        run: |
          k6 run benchmarks/k6/graphql_perf.js \
            --env BASE_URL=http://localhost:8100/graphql \
            --env "SCENARIO=${K6_SCENARIO}" \
            --summary-export=benchmarks/results/graphql-ci-summary.json
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmarks/results/
          retention-days: 90

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let summary = {};
            try {
              summary = JSON.parse(fs.readFileSync('benchmarks/results/ci-summary.json', 'utf8'));
            } catch (e) {
              console.log('No summary file found');
              return;
            }

            const m = summary.metrics || {};
            const body = [
              '## Benchmark Results (slip-stream)',
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Scenario | \`${summary.scenario || 'load'}\` |`,
              `| Total Requests | ${m.http_reqs_total || 'N/A'} |`,
              `| Throughput (req/s) | ${m.http_reqs_rate?.toFixed(1) || 'N/A'} |`,
              `| Latency p50 | ${m.http_req_duration_p50?.toFixed(1) || 'N/A'} ms |`,
              `| Latency p95 | ${m.http_req_duration_p95?.toFixed(1) || 'N/A'} ms |`,
              `| Latency p99 | ${m.http_req_duration_p99?.toFixed(1) || 'N/A'} ms |`,
              `| Error Rate | ${((m.http_req_failed_rate || 0) * 100).toFixed(2)}% |`,
              `| CRUD Errors | ${m.crud_errors || 0} |`,
              '',
              '**Per-operation p95:**',
              '| Operation | p95 (ms) |',
              '|-----------|----------|',
              `| Create | ${m.create_p95?.toFixed(1) || 'N/A'} |`,
              `| Get | ${m.get_p95?.toFixed(1) || 'N/A'} |`,
              `| List | ${m.list_p95?.toFixed(1) || 'N/A'} |`,
              `| Update | ${m.update_p95?.toFixed(1) || 'N/A'} |`,
              `| Delete | ${m.delete_p95?.toFixed(1) || 'N/A'} |`,
              '',
              `<sub>Generated by benchmark workflow on ${new Date().toISOString()}</sub>`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.body.includes('## Benchmark Results (slip-stream)')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
