# Combined docker-compose for cross-framework compatibility testing.
# Runs both slip-stream and stellar-drive against the same MongoDB.
#
# Usage:
#   docker compose -f benchmarks/docker-compose.compat.yml up -d
#   docker compose -f benchmarks/docker-compose.compat.yml --profile test run k6-compat
#   docker compose -f benchmarks/docker-compose.compat.yml down -v
#
# Constrained comparison:
#   SLIP_CPU=1 SLIP_MEM=512m STELLAR_CPU=1 STELLAR_MEM=256m \
#     docker compose -f benchmarks/docker-compose.compat.yml up -d

services:
  mongo:
    image: mongo:7
    ports:
      - "27117:27017"
    healthcheck:
      test: mongosh --eval 'db.runCommand({ping:1})' --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  slip-stream:
    build:
      context: ..
      dockerfile: benchmarks/Dockerfile
    ports:
      - "8100:8100"
    environment:
      - BENCH_MONGO_URI=mongodb://mongo:27017
      - BENCH_DB_NAME=slip_stream_bench
      - BENCH_PORT=8100
    depends_on:
      mongo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${SLIP_CPU:-2}"
          memory: "${SLIP_MEM:-1g}"

  stellar-drive:
    build:
      context: ../../stellar-drive
      dockerfile: benchmarks/Dockerfile
    ports:
      - "8200:8200"
    environment:
      - STELLAR_MONGO_URI=mongodb://mongo:27017
      - STELLAR_MONGO_DATABASE=stellar_drive_bench
      - STELLAR_SERVER_PORT=8200
    depends_on:
      mongo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${STELLAR_CPU:-2}"
          memory: "${STELLAR_MEM:-1g}"

  k6-compat:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts
      - ./results:/results
    environment:
      - APP_A_URL=http://slip-stream:8100/api/v1
      - APP_B_URL=http://stellar-drive:8200/api/v1
      - APP_A_NAME=slip-stream
      - APP_B_NAME=stellar-drive
      - ENTITIES=${K6_ENTITIES:-pet,order,user,tag,category}
    entrypoint: ["k6", "run", "/scripts/compat_test.js"]
    depends_on:
      slip-stream:
        condition: service_healthy
      stellar-drive:
        condition: service_healthy
    profiles:
      - test

  k6-perf-slip:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts
      - ./results:/results
    environment:
      - BASE_URL=http://slip-stream:8100/api/v1
      - SCENARIO=${K6_SCENARIO:-load}
      - ENTITIES=${K6_ENTITIES:-pet,order,user,tag,category}
    entrypoint: ["k6", "run", "/scripts/perf_baseline.js", "--summary-export=/results/slip-stream-docker.json"]
    depends_on:
      slip-stream:
        condition: service_healthy
    profiles:
      - perf

  k6-perf-stellar:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts
      - ./results:/results
    environment:
      - BASE_URL=http://stellar-drive:8200/api/v1
      - SCENARIO=${K6_SCENARIO:-load}
      - ENTITIES=${K6_ENTITIES:-pet,order,user,tag,category}
    entrypoint: ["k6", "run", "/scripts/perf_baseline.js", "--summary-export=/results/stellar-drive-docker.json"]
    depends_on:
      stellar-drive:
        condition: service_healthy
    profiles:
      - perf
