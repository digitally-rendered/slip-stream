version: "3.9"

# Stream infrastructure for end-to-end event delivery testing.
# Usage:
#   docker compose -f benchmarks/docker-compose.streams.yml up -d
#   docker compose -f benchmarks/docker-compose.streams.yml --profile test run k6-stream

services:
  # --- Brokers ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    tmpfs: /var/lib/zookeeper

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js"]  # Enable JetStream
    ports: ["4222:4222"]
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  # --- Infrastructure ---
  mongo:
    image: mongo:7
    ports: ["27117:27017"]
    tmpfs: /data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})", "--quiet"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- App ---
  slip-stream:
    build:
      context: ..
      dockerfile: benchmarks/Dockerfile
    ports: ["8100:8100"]
    environment:
      BENCH_MONGO_URI: mongodb://mongo:27017
      BENCH_DB_NAME: slip_stream_stream_bench
      BENCH_PORT: "8100"
      BENCH_STREAM: memory  # TODO: switch to kafka/nats/redis when adapters are real
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8100/docs"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Event Consumer ---
  event-consumer:
    build:
      context: ./stream/consumer
    ports: ["9090:9090"]
    environment:
      CONSUMER_BACKEND: stub
      CONSUMER_PORT: "9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/health"]
      interval: 3s
      timeout: 3s
      retries: 5

  # --- k6 stream test ---
  k6-stream:
    image: grafana/k6:latest
    profiles: [test]
    volumes:
      - ./k6:/scripts:ro
    environment:
      BASE_URL: http://slip-stream:8100/api/v1
      CONSUMER_URL: http://event-consumer:9090
      K6_SCENARIO: ${K6_SCENARIO:-smoke}
    command: ["run", "/scripts/stream_perf.js"]
    depends_on:
      slip-stream:
        condition: service_healthy
      event-consumer:
        condition: service_healthy
