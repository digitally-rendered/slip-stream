# Pre-commit hooks — runs in order: ruff (lint+fix) → black (format) → mypy (typecheck) → pytest (tests)
# Install: poetry run pre-commit install
# Run all: poetry run pre-commit run --all-files

repos:
  # 1. Ruff — fast linting with auto-fix
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]

  # 2. Black — code formatting (auto-fix)
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black

  # 3. Mypy — static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - types-PyYAML
          - pydantic>=2.0.0
          - fastapi>=0.115.0
          - motor>=3.4.0
          - strawberry-graphql>=0.235.0
          - mcp>=1.0.0
          - sqlalchemy>=2.0.0
          - httpx>=0.27.0
          - dotted-dict>=1.1.3
        pass_filenames: false
        entry: mypy slip_stream/

  # 4. Pytest — run tests (must pass before commit)
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: poetry run pytest tests/ -x -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
